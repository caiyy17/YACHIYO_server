<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YACHIYO Pipeline Viewer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  background: #f0f0f0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Toolbar ── */
#toolbar {
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  flex-shrink: 0;
  z-index: 100;
}

#toolbar label {
  background: #fff;
  color: #000;
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
}
#toolbar label:hover { background: #ddd; }

#config-select {
  background: #333;
  color: #fff;
  border: 1px solid #555;
  padding: 3px 8px;
  font-family: inherit;
  font-size: 12px;
  min-width: 220px;
}

#config-name { font-size: 12px; color: #aaa; }
#toolbar .sep { color: #555; margin: 0 4px; }

/* ── Canvas wrapper ── */
#canvas-wrapper {
  flex: 1;
  overflow: auto;
  position: relative;
  background: #fff;
}

#canvas {
  position: relative;
  min-width: 100%;
  min-height: 100%;
  /* actual size set by JS */
}

/* SVG overlay */
#svg-overlay {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  overflow: visible;
  /* Below the cards (cards z=2): long wires cross column gaps visually
     instead of running over card contents; above the column stripes (z=0). */
  z-index: 1;
}

/* ── Node cards (read-only) ── */
.node-card {
  position: absolute;
  width: 240px;
  background: #fff;
  border: 1.5px solid #000;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  z-index: 2;
}

.node-header {
  background: #000;
  color: #fff;
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: ns-resize;
  user-select: none;
}
.node-header .node-id-label { font-size: 11px; white-space: nowrap; }
.node-func-name {
  flex: 1;
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.node-body {
  padding: 6px 0;
}

/* Port sections */
.port-section {
  padding: 2px 0 4px;
}
.port-section-title {
  font-size: 10px;
  color: #888;
  text-transform: uppercase;
  padding: 0 8px 2px;
  letter-spacing: 0.5px;
}

.port-row {
  display: flex;
  align-items: center;
  min-height: 20px;
  position: relative;
}
.port-row.input-row { padding-right: 8px; }
.port-row.output-row { padding-left: 8px; justify-content: flex-end; }

/* Port circles: pure positional anchors for the connection lines */
.port-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #fff;
  border: 1.5px solid #000;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.port-row.input-row .port-dot { margin-left: -6px; }
.port-row.output-row .port-dot { margin-right: -6px; }
.port-row.pass-row .port-dot.pass-in { margin-left: -6px; }
.port-row.pass-row .port-dot.pass-out { margin-right: -6px; }

.port-name { font-size: 11px; padding: 0 4px; white-space: nowrap; }
.port-wire {
  font-size: 10px;
  color: #888;
  padding: 0 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.port-wire.null-val { color: #b58900; font-style: italic; }

.port-row.pass-row {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 1px 0;
}
.pass-arrow { font-size: 10px; color: #888; flex-shrink: 0; }

/* Signal rows. Flow lines are DERIVED from declarations. */
.port-row.sig-row {
  gap: 4px;
  padding: 1px 8px;
}
.sig-kind {
  font-size: 9px;
  color: #666;
  border: 1px solid #ccc;
  border-radius: 2px;
  padding: 0 3px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.sig-name { font-size: 10px; white-space: nowrap; }

/* Config section */
.config-section {
  border-top: 1px solid #eee;
  padding: 4px 0;
}
.config-section-title {
  font-size: 10px;
  color: #888;
  text-transform: uppercase;
  padding: 0 8px 2px;
  letter-spacing: 0.5px;
}
.config-param {
  display: flex;
  align-items: flex-start;
  gap: 2px;
  padding: 1px 8px;
  font-size: 11px;
}
.config-key { color: #333; flex-shrink: 0; }
.config-colon { color: #888; padding: 0 2px; flex-shrink: 0; }
.config-val {
  color: #555;
  word-break: break-all;
  white-space: pre-wrap;
}

/* Notification */
#notify {
  position: fixed;
  bottom: 12px;
  right: 12px;
  background: #000;
  color: #fff;
  padding: 6px 14px;
  font-size: 12px;
  display: none;
  z-index: 999;
}
</style>
</head>
<body>

<div id="toolbar">
  <select id="config-select"><option value="">— select a config —</option></select>
  <span class="sep">|</span>
  <label for="file-input">Load JSON file</label>
  <input type="file" id="file-input" accept=".json" style="display:none">
  <span class="sep">|</span>
  <span id="config-name"></span>
</div>

<div id="canvas-wrapper">
  <div id="canvas">
    <svg id="svg-overlay"></svg>
  </div>
</div>

<div id="notify"></div>

<script>
// ─────────────────────────────────────────────
//  Read-only pipeline viewer: renders one config's graph — data wires
//  (matched by variable name), declaration-derived signal flows, per-node
//  params. No editing of any kind.
// ─────────────────────────────────────────────

// Wire-side null convention: a real JSON null (the config protocol's
// explicit opt-out) is displayed as the literal text "null".
const wireShow = v => v === null ? 'null' : (v || '');

const NODE_W = 240;
const NODE_GAP_X = 60;
const CANVAS_PAD = 40;

// State
let nodes = [];       // [{id, fn, inputs, outputs, passes, catchSigs, passSigs, emitSigs, extraConfig, nextNodes, el, x, y}]
let connections = []; // [{fromNodeId, fromPortType, fromPortIdx, toNodeId, toPortType, toPortIdx}]

// ─────────────────────────────────────────────
//  Utilities
// ─────────────────────────────────────────────
function notify(msg, ms = 3000) {
  const el = document.getElementById('notify');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; }, ms);
}

function getNodeById(id) {
  return nodes.find(n => n.id === id);
}

// ─────────────────────────────────────────────
//  Canvas sizing
// ─────────────────────────────────────────────
function updateCanvasSize() {
  let maxX = 800, maxY = 600;
  nodes.forEach(n => {
    const h = n.el.offsetHeight;
    maxX = Math.max(maxX, n.x + NODE_W + CANVAS_PAD);
    maxY = Math.max(maxY, n.y + h + CANVAS_PAD);
  });
  const canvas = document.getElementById('canvas');
  canvas.style.width = maxX + 'px';
  canvas.style.height = maxY + 'px';
  const svg = document.getElementById('svg-overlay');
  svg.setAttribute('width', maxX);
  svg.setAttribute('height', maxY);
}

// ─────────────────────────────────────────────
//  Port position helpers
// ─────────────────────────────────────────────
function getPortPos(nodeId, portType, portIdx) {
  const node = getNodeById(nodeId);
  if (!node) return null;
  const dots = getPortDots(node.el, portType);
  if (!dots || portIdx >= dots.length) return null;
  const dot = dots[portIdx];
  const wrapper = document.getElementById('canvas-wrapper');
  const wrapperRect = wrapper.getBoundingClientRect();
  const dotRect = dot.getBoundingClientRect();
  const x = dotRect.left - wrapperRect.left + wrapper.scrollLeft + dotRect.width / 2;
  const y = dotRect.top - wrapperRect.top + wrapper.scrollTop + dotRect.height / 2;
  return { x, y };
}

function getPortDots(cardEl, portType) {
  if (portType === 'input') return Array.from(cardEl.querySelectorAll('.port-row.input-row .port-dot'));
  if (portType === 'output') return Array.from(cardEl.querySelectorAll('.port-row.output-row .port-dot'));
  if (portType === 'pass-in') return Array.from(cardEl.querySelectorAll('.port-row.pass-row .port-dot.pass-in'));
  if (portType === 'pass-out') return Array.from(cardEl.querySelectorAll('.port-row.pass-row .port-dot.pass-out'));
  return [];
}

function linePath(x1, y1, x2, y2) {
  return `M ${x1} ${y1} L ${x2} ${y2}`;
}

// ─────────────────────────────────────────────
//  Connection rendering (data wires, matched by variable name)
// ─────────────────────────────────────────────
function renderConnections() {
  const svg = document.getElementById('svg-overlay');
  Array.from(svg.querySelectorAll('path')).forEach(p => p.remove());

  connections.forEach(conn => {
    const fromPos = getPortPos(conn.fromNodeId, conn.fromPortType, conn.fromPortIdx);
    const toPos   = getPortPos(conn.toNodeId,   conn.toPortType,   conn.toPortIdx);
    if (!fromPos || !toPos) return;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', linePath(fromPos.x, fromPos.y, toPos.x, toPos.y));
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#000');
    path.setAttribute('stroke-width', '1.5');
    if (conn.fromPortType === 'pass-out') {
      path.setAttribute('stroke-dasharray', '5,3');
    }
    svg.appendChild(path);
  });
  renderSignalFlows(svg);
  updateCanvasSize();
}

// ─────────────────────────────────────────────
//  Signal flow derivation & rendering
//  Signal flows are DERIVED from the declarations and STRICTLY follow the
//  declared next_nodes edges: a relayed/emitted signal connects to every
//  next node that declares it (catch and/or pass), and the walk recurses
//  through passes. The dispatcher is the directed exception, mirroring the
//  server: its pass relay jumps straight to its receiver (the last
//  next_nodes entry), its dispatch_signals copies go to the branch nodes.
//  Signals declared on the head node come from the client. A hop where NO
//  next node declares the wire is a wiring error: drawn red at next_nodes[0]
//  (where the server would drop it).
// ─────────────────────────────────────────────
function computeSignalFlows(nodeList) {
  const segs = [];  // {from:{nodeId,kind,source}|null(external), to:{nodeId,kind,source}, warn, external}
  const byId = {};
  nodeList.forEach(n => { byId[n.id] = n; });

  // Enter `cur` carrying wire name `w`: draw the arrival, then relay onward
  // through a pass declaration.
  function visit(cur, w, f, guard) {
    const key = cur.id + '|' + w;
    if (guard.has(key)) return;          // cycle guard
    guard.add(key);
    const c = (cur.catchSigs || []).find(s => s.source === w);
    const p = (cur.passSigs || []).find(s => s.source === w);
    if (!c && !p) {                      // undeclared: dropped here
      segs.push({ from: f, to: { nodeId: cur.id, kind: null, source: w }, warn: true });
      return;
    }
    if (c) segs.push({ from: f, to: { nodeId: cur.id, kind: 'catch', source: w }, warn: false });
    if (p) {
      if (!c) {
        segs.push({ from: f, to: { nodeId: cur.id, kind: 'pass', source: w }, warn: false });
      } else {
        // consume-then-relay: in-node hop from the catch row to the pass row
        segs.push({ from: { nodeId: cur.id, kind: 'catch', source: w },
                    to: { nodeId: cur.id, kind: 'pass', source: w },
                    warn: false, internal: true });
      }
      const nf = { nodeId: cur.id, kind: 'pass', source: w };
      const nw = p.target || p.source;
      if (cur.fn === 'call_dispatcher') {
        // Dispatcher pass is a DIRECTED envelope to its receiver — the last
        // next_nodes entry — not an edge-by-edge relay.
        const nn = cur.nextNodes || [];
        const recv = byId[nn[nn.length - 1]];
        if (recv) visit(recv, nw, nf, guard);
        return;
      }
      deliver(cur, nw, nf, guard);
    }
    // catch-only: consumed
  }

  // Hand wire `w` leaving `fromNode` to its next edges: every next node
  // that declares it receives a line; none declaring it = dropped at the
  // first edge (red); no real next nodes = leaves to the client.
  function deliver(fromNode, w, f, guard) {
    const nexts = (fromNode.nextNodes || []).map(id => byId[id]).filter(Boolean);
    if (!nexts.length) return;           // exit (-1): to the client
    const declaring = nexts.filter(m =>
      (m.catchSigs || []).some(s => s.source === w) ||
      (m.passSigs || []).some(s => s.source === w));
    if (!declaring.length) {
      segs.push({ from: f, to: { nodeId: nexts[0].id, kind: null, source: w }, warn: true });
      return;
    }
    declaring.forEach(m => visit(m, w, f, guard));
  }

  nodeList.forEach(n => {
    // Dispatcher emits are directed envelopes (explicit destination): drawn
    // straight to their catcher instead of walking the pass chain.
    const directed = n.fn === 'call_dispatcher';
    (n.emitSigs || []).filter(s => s.source).forEach(sg => {
      if (sg.target === null) return;   // suppressed emit (explicit null): not sent
      const wire = sg.target || sg.source;
      const from = { nodeId: n.id, kind: 'emit', source: sg.source };
      if (directed) {
        nodeList.forEach(m => {
          if (m === n) return;
          if ((m.catchSigs || []).some(s => s.source === wire)) {
            segs.push({ from, to: { nodeId: m.id, kind: 'catch', source: wire }, warn: false });
          }
        });
      } else {
        deliver(n, wire, from, new Set());
      }
    });
  });

  // dispatch_signals: directed per-branch copies of caught signals — drawn
  // from the dispatcher's catch row (by its target name) to every BRANCH
  // node (its next_nodes) catching that name.
  nodeList.forEach(n => {
    if (n.fn !== 'call_dispatcher') return;
    const ds = (n.extraConfig && n.extraConfig.dispatch_signals) || [];
    const names = new Set([].concat(...ds));
    names.forEach(t => {
      const catchEntry = (n.catchSigs || []).find(s => (s.target || s.source) === t);
      if (!catchEntry) return;  // validator reports this misconfig
      const from = { nodeId: n.id, kind: 'catch', source: catchEntry.source };
      (n.nextNodes || []).map(id => byId[id]).filter(Boolean).forEach(m => {
        if ((m.catchSigs || []).some(s => s.source === t)) {
          segs.push({ from, to: { nodeId: m.id, kind: 'catch', source: t }, warn: false });
        }
      });
    });
  });

  // Client-injected signals: declarations on the head node with no upstream
  if (nodeList.length) {
    const n0 = nodeList[0];
    const seen = new Set();
    [...(n0.catchSigs || []), ...(n0.passSigs || [])].filter(s => s.source).forEach(sg => {
      if (seen.has(sg.source)) return;
      seen.add(sg.source);
      const c = (n0.catchSigs || []).find(s => s.source === sg.source);
      const p = (n0.passSigs || []).find(s => s.source === sg.source);
      segs.push({ from: null, external: true,
                  to: { nodeId: n0.id, kind: c ? 'catch' : 'pass', source: sg.source }, warn: false });
      if (p) deliver(n0, p.target || p.source,
                     { nodeId: n0.id, kind: 'pass', source: sg.source }, new Set());
    });
  }
  return segs;
}

function getSigRowPos(nodeId, kind, source, side) {
  const node = getNodeById(nodeId);
  if (!node || !node.el) return null;
  let el;
  if (kind === null) {
    el = node.el;                          // warn target: the card itself
  } else {
    el = node.el.querySelector(`[data-sig="${kind}-${CSS.escape(source)}"]`);
  }
  if (!el) return null;
  const wrapper = document.getElementById('canvas-wrapper');
  const wrapperRect = wrapper.getBoundingClientRect();
  const r = el.getBoundingClientRect();
  const x = (side === 'right' ? r.right : r.left) - wrapperRect.left + wrapper.scrollLeft;
  const y = r.top - wrapperRect.top + wrapper.scrollTop + Math.min(r.height, 22) / 2;
  return { x, y };
}

function renderSignalFlows(svg) {
  Array.from(svg.querySelectorAll('path.sig-flow')).forEach(p => p.remove());
  const segs = computeSignalFlows(nodes);
  segs.forEach(seg => {
    const toPos = getSigRowPos(seg.to.nodeId, seg.to.kind, seg.to.source, 'left');
    if (!toPos) return;
    let fromPos;
    if (seg.external) {
      fromPos = { x: toPos.x - 25, y: toPos.y };
    } else if (seg.internal) {
      fromPos = getSigRowPos(seg.from.nodeId, seg.from.kind, seg.from.source, 'left');
    } else {
      fromPos = getSigRowPos(seg.from.nodeId, seg.from.kind, seg.from.source, 'right');
    }
    if (!fromPos) return;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    // internal (consume-then-relay) hop: both ends on the card's left edge,
    // drawn as a small leftward arc between the catch row and the pass row
    const d = seg.internal
      ? `M ${fromPos.x} ${fromPos.y} C ${fromPos.x - 14} ${fromPos.y}, ${toPos.x - 14} ${toPos.y}, ${toPos.x} ${toPos.y}`
      : linePath(fromPos.x, fromPos.y, toPos.x, toPos.y);
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', seg.warn ? '#d33' : '#999');
    path.setAttribute('stroke-width', '1');
    path.setAttribute('stroke-dasharray', '3,3');
    path.setAttribute('class', 'sig-flow');
    if (seg.warn) {
      const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
      title.textContent = `undeclared signal '${seg.to.source}' would be dropped here`;
      path.appendChild(title);
    }
    svg.appendChild(path);
  });
}

// ─────────────────────────────────────────────
//  Node card builders (all read-only)
// ─────────────────────────────────────────────
function createNode(options) {
  const nodeObj = {
    id: options.id,
    fn: options.fn,
    inputs: options.inputs || [],     // [{name, source}]
    outputs: options.outputs || [],   // [{name, target}]
    passes: options.passes || [],     // [{source, target}]
    catchSigs: options.catchSigs || [],
    passSigs: options.passSigs || [],
    emitSigs: options.emitSigs || [],
    extraConfig: options.extraConfig || {},
    nextNodes: options.nextNodes || [],
    x: options.x, y: options.y, el: null,
  };
  nodes.push(nodeObj);

  // Column background stripe
  const hue = (nodeObj.id * 47) % 360;
  const colBg = document.createElement('div');
  colBg.className = 'col-bg';
  const colLeft = nodeObj.x - NODE_GAP_X / 2;
  const colWidth = NODE_W + NODE_GAP_X;
  colBg.style.cssText = `position:absolute;left:${colLeft}px;top:0;width:${colWidth}px;height:100%;background:hsl(${hue},40%,88%);z-index:0;pointer-events:none;`;
  document.getElementById('canvas').appendChild(colBg);

  nodeObj.el = buildNodeCard(nodeObj);
  nodeObj.el.style.left = nodeObj.x + 'px';
  nodeObj.el.style.top  = nodeObj.y + 'px';
  document.getElementById('canvas').appendChild(nodeObj.el);
  return nodeObj;
}

function wireSpan(value, cls) {
  const span = document.createElement('span');
  span.className = cls + (value === null ? ' null-val' : '');
  span.textContent = wireShow(value);
  return span;
}

function buildNodeCard(nodeObj) {
  const card = document.createElement('div');
  card.className = 'node-card';
  card.dataset.nodeId = nodeObj.id;

  // Header: [id] function
  const header = document.createElement('div');
  header.className = 'node-header';
  const idLabel = document.createElement('span');
  idLabel.className = 'node-id-label';
  idLabel.textContent = `[${nodeObj.id}]`;
  const fnLabel = document.createElement('span');
  fnLabel.className = 'node-func-name';
  fnLabel.textContent = nodeObj.fn;
  header.appendChild(idLabel);
  header.appendChild(fnLabel);
  card.appendChild(header);

  // Vertical-only drag: view rearrangement, not an edit
  header.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const dragStartY = e.clientY;
    const dragStartTop = parseInt(card.style.top) || 0;
    const onMove = (ev) => {
      card.style.top = Math.max(0, dragStartTop + ev.clientY - dragStartY) + 'px';
      renderConnections();
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      nodeObj.y = parseInt(card.style.top) || 0;
      updateCanvasSize();
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  const body = document.createElement('div');
  body.className = 'node-body';
  card.appendChild(body);

  const section = (title) => {
    const sec = document.createElement('div');
    sec.className = 'port-section';
    const t = document.createElement('div');
    t.className = 'port-section-title';
    t.textContent = title;
    sec.appendChild(t);
    return sec;
  };

  // INPUTS: dot | wire source | contract name
  if (nodeObj.inputs.length) {
    const sec = section('Inputs');
    nodeObj.inputs.forEach(inp => {
      const row = document.createElement('div');
      row.className = 'port-row input-row';
      const dot = document.createElement('div');
      dot.className = 'port-dot';
      row.appendChild(dot);
      row.appendChild(wireSpan(inp.source, 'port-wire'));
      const name = document.createElement('span');
      name.className = 'port-name';
      name.textContent = inp.name;
      name.style.marginLeft = 'auto';
      row.appendChild(name);
      sec.appendChild(row);
    });
    body.appendChild(sec);
  }

  // OUTPUTS: contract name | wire target | dot
  if (nodeObj.outputs.length) {
    const sec = section('Outputs');
    nodeObj.outputs.forEach(out => {
      const row = document.createElement('div');
      row.className = 'port-row output-row';
      const name = document.createElement('span');
      name.className = 'port-name';
      name.textContent = out.name;
      name.style.marginRight = 'auto';
      row.appendChild(name);
      row.appendChild(wireSpan(out.target, 'port-wire'));
      const dot = document.createElement('div');
      dot.className = 'port-dot';
      row.appendChild(dot);
      sec.appendChild(row);
    });
    body.appendChild(sec);
  }

  // PASS: dot | source → target | dot
  if (nodeObj.passes.length) {
    const sec = section('Pass');
    nodeObj.passes.forEach(pv => {
      const row = document.createElement('div');
      row.className = 'port-row pass-row';
      const dotIn = document.createElement('div');
      dotIn.className = 'port-dot pass-in';
      row.appendChild(dotIn);
      row.appendChild(wireSpan(pv.source, 'port-wire'));
      const arrow = document.createElement('span');
      arrow.className = 'pass-arrow';
      arrow.textContent = '→';
      row.appendChild(arrow);
      row.appendChild(wireSpan(pv.target, 'port-wire'));
      const dotOut = document.createElement('div');
      dotOut.className = 'port-dot pass-out';
      dotOut.style.marginLeft = 'auto';
      row.appendChild(dotOut);
      sec.appendChild(row);
    });
    body.appendChild(sec);
  }

  // SIGNALS: kind badge | source → target (four-state declarations; flow
  // lines are declaration-derived, anchored on these rows via data-sig)
  const sigLists = [['catch', nodeObj.catchSigs], ['pass', nodeObj.passSigs], ['emit', nodeObj.emitSigs]];
  if (sigLists.some(([, l]) => l.length)) {
    const sec = section('Signals');
    sigLists.forEach(([kind, list]) => {
      list.forEach(sg => {
        const row = document.createElement('div');
        row.className = 'port-row sig-row';
        row.dataset.sig = `${kind}-${sg.source}`;
        const badge = document.createElement('span');
        badge.className = 'sig-kind';
        badge.textContent = kind;
        row.appendChild(badge);
        row.appendChild(wireSpan(sg.source, 'sig-name'));
        const arrow = document.createElement('span');
        arrow.className = 'pass-arrow';
        arrow.textContent = '→';
        row.appendChild(arrow);
        row.appendChild(wireSpan(sg.target, 'sig-name'));
        sec.appendChild(row);
      });
    });
    body.appendChild(sec);
  }

  // CONFIG: module params (everything beyond the wiring declarations)
  const entries = Object.entries(nodeObj.extraConfig);
  if (entries.length || nodeObj.nextNodes.length) {
    const sec = document.createElement('div');
    sec.className = 'config-section';
    const t = document.createElement('div');
    t.className = 'config-section-title';
    t.textContent = 'Config';
    sec.appendChild(t);
    const addParam = (k, v) => {
      const row = document.createElement('div');
      row.className = 'config-param';
      const key = document.createElement('span');
      key.className = 'config-key';
      key.textContent = k;
      const colon = document.createElement('span');
      colon.className = 'config-colon';
      colon.textContent = ':';
      const val = document.createElement('span');
      val.className = 'config-val';
      val.textContent = typeof v === 'string' ? v : JSON.stringify(v);
      row.appendChild(key);
      row.appendChild(colon);
      row.appendChild(val);
      sec.appendChild(row);
    };
    addParam('next_nodes', nodeObj.nextNodes);
    entries.forEach(([k, v]) => addParam(k, v));
    body.appendChild(sec);
  }

  return card;
}

// ─────────────────────────────────────────────
//  Load & render a config document
// ─────────────────────────────────────────────
function loadPipeline(data) {
  nodes.forEach(n => n.el.remove());
  nodes = [];
  connections = [];
  document.getElementById('svg-overlay').innerHTML = '';
  document.querySelectorAll('.col-bg').forEach(el => el.remove());

  const pipeline = data.pipeline || [];

  // Column position = node_id (missing IDs are empty columns)
  pipeline.forEach((item) => {
    const x = CANVAS_PAD + item.node_id * (NODE_W + NODE_GAP_X);
    const y = CANVAS_PAD;

    const cfg = item.config || {};
    const inputs  = (cfg.input_vars  || []).map(iv => ({ name: iv.target, source: iv.source }));
    const outputs = (cfg.output_vars || []).map(ov => ({ name: ov.source, target: ov.target }));
    const passes  = (cfg.pass_vars   || []).map(pv => ({ source: pv.source, target: pv.target }));
    // Signal declarations are explicit {source, target} objects; a real
    // null (explicit opt-out) is preserved, distinct from empty.
    const parseSigs = arr => (arr || []).map(e => (
      { source: e.source === null ? null : (e.source || ''),
        target: e.target === null ? null : (e.target || '') }));

    // Module params = everything except the wiring declarations
    const reserved = new Set(['input_vars', 'output_vars', 'pass_vars', 'next_nodes',
                              'catch_signals', 'pass_signals', 'emit_signals']);
    const extraConfig = {};
    Object.entries(cfg).forEach(([k, v]) => {
      if (!reserved.has(k)) extraConfig[k] = v;
    });

    createNode({ id: item.node_id, fn: item.function, inputs, outputs, passes,
                 catchSigs: parseSigs(cfg.catch_signals),
                 passSigs: parseSigs(cfg.pass_signals),
                 emitSigs: parseSigs(cfg.emit_signals),
                 extraConfig,
                 nextNodes: (cfg.next_nodes || []).slice(), x, y });
  });

  // Data wires STRICTLY along the declared next_nodes edges: a consumer row
  // (input/pass source) connects to the producing port (output target, or
  // pass target for relays) of an IMMEDIATE predecessor — a node listing
  // this one in next_nodes. On the server a message only travels along
  // edges (normal nodes address next_nodes[0], their single real edge; the
  // dispatcher routes every branch plus its receiver), so for a runnable
  // config this IS the physical flow — a name coincidence between
  // non-adjacent nodes can no longer draw a line. Within one producer,
  // output targets take priority over a same-named pass target.
  const byId = {};
  nodes.forEach(n => { byId[n.id] = n; });
  const producerPort = (A, name) => {
    let idx = A.outputs.findIndex(o => o.target === name);
    if (idx >= 0) return { fromNodeId: A.id, fromPortType: 'output', fromPortIdx: idx };
    idx = A.passes.findIndex(pv => pv.target === name);
    if (idx >= 0) return { fromNodeId: A.id, fromPortType: 'pass-out', fromPortIdx: idx };
    return null;
  };
  nodes.forEach(A => {
    (A.nextNodes || []).map(id => byId[id]).filter(Boolean).forEach(B => {
      B.inputs.forEach((inp, toIdx) => {
        if (!inp.source) return;
        const from = producerPort(A, inp.source);
        if (from) connections.push({ ...from, toNodeId: B.id, toPortType: 'input', toPortIdx: toIdx });
      });
      B.passes.forEach((pv, toIdx) => {
        if (!pv.source) return;
        const from = producerPort(A, pv.source);
        if (from) connections.push({ ...from, toNodeId: B.id, toPortType: 'pass-in', toPortIdx: toIdx });
      });
    });
  });

  renderConnections();
  updateCanvasSize();
}

// ─────────────────────────────────────────────
//  Config sources: server dropdown + local file
// ─────────────────────────────────────────────
async function populateConfigList() {
  try {
    const r = await fetch('/api/configs');
    const res = await r.json();
    if (!res.success) throw new Error(res.message);
    const sel = document.getElementById('config-select');
    res.data.configs
      .filter(c => c.type === 'config')
      .sort((a, b) => a.name.localeCompare(b.name))
      .forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.name;
        opt.textContent = c.name;
        sel.appendChild(opt);
      });
  } catch (err) {
    notify('Config list unavailable: ' + err.message, 5000);
  }
}

document.getElementById('config-select').addEventListener('change', async (e) => {
  const name = e.target.value;
  if (!name) return;
  try {
    const r = await fetch(`/api/config/config/${encodeURIComponent(name)}`);
    const res = await r.json();
    if (!res.success) throw new Error(res.message);
    loadPipeline(JSON.parse(res.data.content));
    document.getElementById('config-name').textContent = name + '.json';
    notify('Loaded: ' + name);
  } catch (err) {
    notify('Error loading config: ' + err.message, 5000);
  }
});

document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      loadPipeline(JSON.parse(ev.target.result));
      document.getElementById('config-select').value = '';
      document.getElementById('config-name').textContent = file.name;
      notify('Loaded: ' + file.name);
    } catch (err) {
      notify('Error parsing JSON: ' + err.message, 5000);
    }
  };
  reader.readAsText(file);
  e.target.value = ''; // reset so the same file can be reloaded
});

// Re-render on scroll (port positions shift)
document.getElementById('canvas-wrapper').addEventListener('scroll', () => {
  renderConnections();
});

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
populateConfigList();
updateCanvasSize();
</script>
</body>
</html>
