<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebRTC Client</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: monospace; background: #fff; color: #111; padding: 20px; }
h1 { font-size: 18px; margin-bottom: 16px; }

.row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
label { min-width: 100px; font-size: 13px; }
input, select { font-family: monospace; font-size: 13px; padding: 4px 8px; border: 1px solid #999; }
input[type="text"] { width: 240px; }

button { font-family: monospace; font-size: 13px; padding: 6px 16px; border: 1px solid #111;
  background: #fff; cursor: pointer; }
button:hover { background: #eee; }
button:active { background: #ddd; }
button:disabled { color: #999; border-color: #ccc; cursor: default; }
button.danger { border-color: #c00; color: #c00; }
button.danger:hover { background: #fee; }

#talkBtn { font-size: 16px; padding: 12px 32px; user-select: none; -webkit-user-select: none; }
#talkBtn.active { background: #111; color: #fff; }

.panel { display: flex; gap: 20px; margin-top: 16px; }
.col { flex: 1; }

video { width: 100%; background: #000; display: block; }
#log { font-size: 12px; height: 300px; overflow-y: auto; border: 1px solid #ccc;
  padding: 8px; white-space: pre-wrap; word-break: break-all; background: #fafafa; }

.status { font-size: 12px; color: #666; margin-bottom: 8px; }
.status .on { color: #090; }
.status .off { color: #c00; }
</style>
</head>
<body>

<h1>WebRTC Client</h1>

<div class="row">
  <label>Main Server</label>
  <input type="text" id="mainServer" value="">
</div>
<div class="row">
  <label>WebRTC Server</label>
  <input type="text" id="webrtcServer" value="">
</div>
<div class="row">
  <label>Client ID</label>
  <input type="text" id="clientId" value="">
</div>
<div class="row">
  <label>Pipeline</label>
  <input type="text" id="pipeline" value="unity_chan_webrtc">
</div>
<div class="row">
  <button id="connectBtn" onclick="connect()">Connect</button>
  <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
</div>

<div class="status" id="statusLine">
  Connection: <span class="off">disconnected</span>
</div>

<div class="row" style="margin-top: 12px;">
  <button id="talkBtn" disabled>Hold to Talk</button>
  <button id="cancelBtn" class="danger" onclick="sendCancel()" disabled>Cancel</button>
</div>

<div class="panel">
  <div class="col">
    <div style="font-size: 13px; margin-bottom: 4px;">Received Video</div>
    <video id="remoteVideo" autoplay playsinline></video>
    <audio id="remoteAudio" autoplay></audio>
  </div>
  <div class="col">
    <div style="font-size: 13px; margin-bottom: 4px;">Log</div>
    <div id="log"></div>
  </div>
</div>

<script>
// Auto-fill defaults based on current host
const host = window.location.hostname || 'localhost';
document.getElementById('mainServer').value = `http://${host}:8910`;
// The page is served by the webrtc server itself, so its origin is the
// webrtc server (works for localhost, LAN IPs and tunnels alike).
document.getElementById('webrtcServer').value =
  window.location.origin.startsWith('http') ? window.location.origin : `http://${host}:15168`;
document.getElementById('clientId').value = generateClientId();

let pc = null;
let dc = null;
let localStream = null;
let cameraStream = null;
let canvasStream = null;
let resampleRAF = null;
let connected = false;
let disconnecting = false;
let shouldUnregister = false;
let visibilityHandler = null;
let ownedClientId = null;
let ownedMainServer = null;

const logEl = document.getElementById('log');
function log(msg) {
  const t = new Date().toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit', fractionalSecondDigits:3});
  logEl.textContent += `[${t}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(text, ok) {
  document.getElementById('statusLine').innerHTML =
    `Connection: <span class="${ok ? 'on' : 'off'}">${text}</span>`;
}

function generateClientId() {
  // NOT crypto.randomUUID(): that requires a secure context (https/localhost)
  // and throws when the page is opened over plain http on a LAN IP.
  return 'web-' + Math.random().toString(36).slice(2, 10);
}

async function fetchJson(url, options = {}, timeoutMs = 120000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const response = await fetch(url, {...options, signal: controller.signal});
    const text = await response.text();
    let result;
    try {
      result = JSON.parse(text);
    } catch(e) {
      throw new Error(`Invalid JSON response (HTTP ${response.status})`);
    }
    if (!response.ok) {
      const detail = result?.detail ?? result?.error;
      throw new Error(detail
        ? (typeof detail === 'string' ? detail : JSON.stringify(detail))
        : `HTTP ${response.status}`);
    }
    return result;
  } catch(e) {
    if (e.name === 'AbortError') throw new Error(`Request timed out after ${timeoutMs} ms`);
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

// Resample a video source to target fps via canvas
// Uses rAF in foreground, setInterval in background (rAF pauses when tab hidden)
let resampleTimer = null;
let resampleSource = null;
let resampleCtx = null;

function startResample(source, w, h, fps) {
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  resampleCtx = canvas.getContext('2d');
  resampleSource = source;

  function draw() {
    resampleCtx.drawImage(resampleSource, 0, 0, w, h);
  }
  function rafLoop() {
    draw();
    resampleRAF = requestAnimationFrame(rafLoop);
  }

  visibilityHandler = function() {
    if (document.hidden) {
      // Tab hidden: stop rAF, start interval (throttled to ~1fps by browser, but
      // captureStream still outputs at target fps with repeated frames)
      if (resampleRAF) { cancelAnimationFrame(resampleRAF); resampleRAF = null; }
      if (!resampleTimer) resampleTimer = setInterval(draw, 1000 / fps);
    } else {
      // Tab visible: stop interval, resume rAF
      if (resampleTimer) { clearInterval(resampleTimer); resampleTimer = null; }
      if (!resampleRAF) rafLoop();
    }
  };
  document.addEventListener('visibilitychange', visibilityHandler);

  rafLoop();
  canvasStream = canvas.captureStream(fps);
  return canvasStream.getVideoTracks()[0];
}

// Camera with canvas resample; placeholder fallback if no camera
async function getVideoTrack(w, h, fps) {
  const video = document.createElement('video');
  video.muted = true;

  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: w }, height: { ideal: h }, frameRate: { ideal: fps } }
    });
    const s = cameraStream.getVideoTracks()[0].getSettings();
    log(`Camera: ${s.width}x${s.height} @ ${s.frameRate}fps -> resample to ${fps}fps`);
    video.srcObject = cameraStream;
  } catch(e) {
    log(`WARNING: Camera unavailable (${e.message}), using placeholder`);
    video.src = `/static/placeholder_${w}x${h}.webm`;
    video.loop = true;
  }

  await video.play();
  return startResample(video, w, h, fps);
}

async function connect() {
  const connectBtn = document.getElementById('connectBtn');
  if (connectBtn.disabled) return;
  connectBtn.disabled = true;
  const mainServer = document.getElementById('mainServer').value;
  const webrtcServer = document.getElementById('webrtcServer').value;
  let clientId = document.getElementById('clientId').value;
  const pipeline = document.getElementById('pipeline').value;

  if (!clientId) {
    clientId = generateClientId();
    document.getElementById('clientId').value = clientId;
  }

  log(`Registering ${clientId}...`);
  shouldUnregister = false;
  ownedClientId = clientId;
  ownedMainServer = mainServer;
  try {
    const registration = await fetchJson(`${mainServer}/register/`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({client_id: clientId})
    });
    if (!['registered', 'already registered'].includes(registration.status)) {
      throw new Error(`Unexpected register status: ${registration.status}`);
    }
    shouldUnregister = registration.status === 'registered';
    log(`Register: ${registration.status}`);

    const initialized = await fetchJson(
      `${mainServer}/init_pipeline/${encodeURIComponent(clientId)}`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({config: pipeline})
    }, 310000);
    shouldUnregister = true;
    log(`Pipeline: ${initialized.status}`);
  } catch(e) {
    log(`Setup error: ${e.message}`);
    await disconnect();
    return;
  }

  // Fetch the WebRTC session settings from the server (same single source the
  // gateway uses: the config's top-level "webrtc" section). Timing params
  // (video_fps here, for local capture) come from the config; resolution is
  // the client's own choice, so it stays at a default.
  const VIDEO_W = 1280, VIDEO_H = 720;   // default resolution
  let videoFps;
  try {
    const info = await fetchJson(
      `${mainServer}/clients/${encodeURIComponent(clientId)}`
    );
    videoFps = info.pipeline_config?.webrtc?.video_fps;
    if (videoFps == null) throw new Error('video_fps is missing from pipeline config');
    log(`WebRTC settings: video_fps=${videoFps} (from server), ` +
        `${VIDEO_W}x${VIDEO_H} (default)`);
  } catch(e) {
    log(`WebRTC settings fetch failed: ${e.message}`);
    await disconnect();
    return;
  }

  // Get microphone
  try {
    localStream = await navigator.mediaDevices.getUserMedia({audio: true, video: false});
    log('Microphone acquired');
  } catch(e) {
    log(`Mic error: ${e.message}`);
    await disconnect();
    return;
  }

  try {
    // Create PeerConnection
    pc = new RTCPeerConnection();
    pc.addTrack(localStream.getAudioTracks()[0], localStream);
    pc.addTrack(await getVideoTrack(VIDEO_W, VIDEO_H, videoFps));

  // DataChannel
  dc = pc.createDataChannel('client-signals', {ordered: true});
  dc.onopen = () => {
    log('DataChannel open');
    document.getElementById('talkBtn').disabled = false;
    document.getElementById('cancelBtn').disabled = false;
  };
  dc.onclose = () => log('DataChannel closed');

  // Receive tracks
  const remoteStream = new MediaStream();
  pc.ontrack = (e) => {
    log(`Received ${e.track.kind} track`);
    remoteStream.addTrack(e.track);
    if (e.track.kind === 'video') {
      document.getElementById('remoteVideo').srcObject = remoteStream;
    } else {
      document.getElementById('remoteAudio').srcObject = new MediaStream([e.track]);
    }
  };

  // Receive DataChannel from server
  pc.ondatachannel = (e) => {
    log(`Server DC: ${e.channel.label}`);
    // Deep-copy with long strings (e.g. base64 audio) truncated for display
    const trunc = (v) => {
      if (typeof v === 'string') return v.length > 60 ? v.slice(0, 57) + '...' : v;
      if (Array.isArray(v)) return v.map(trunc);
      if (v && typeof v === 'object') {
        const o = {}; for (const [k, x] of Object.entries(v)) o[k] = trunc(x); return o;
      }
      return v;
    };
    e.channel.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (Object.keys(msg).length === 0) return;   // skip empty frames
        log(JSON.stringify(trunc(msg)));              // print the whole message, as-is
      } catch(err) {}
    };
  };

  const currentPc = pc;
  currentPc.onconnectionstatechange = () => {
    const state = currentPc.connectionState;
    log(`Connection: ${state}`);
    if (state === 'connected') {
      connected = true;
      setStatus('connected', true);
    } else if (state === 'failed' || state === 'closed') {
      connected = false;
      setStatus('disconnected', false);
      if (!disconnecting) disconnect();
    }
  };

  // Create offer
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  log('Sending offer...');
    const answer = await fetchJson(
      `${webrtcServer}/offer/${encodeURIComponent(clientId)}`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        sdp: pc.localDescription.sdp, type: pc.localDescription.type,
        // only resolution is the client's choice; timing comes from the
        // config's webrtc section (the gateway reads it server-side)
        video_width: VIDEO_W, video_height: VIDEO_H
      })
    });
    await pc.setRemoteDescription(new RTCSessionDescription(answer));
    log('Answer received');
  } catch(e) {
    log(`Connection setup failed: ${e.message}`);
    await disconnect();
    return;
  }

  connectBtn.disabled = true;
  document.getElementById('disconnectBtn').disabled = false;
}

async function disconnect() {
  if (disconnecting) return;
  disconnecting = true;
  connected = false;
  if (pc) {
    const closingPc = pc;
    pc = null;
    closingPc.onconnectionstatechange = null;
    closingPc.close();
  }
  if (resampleRAF) { cancelAnimationFrame(resampleRAF); resampleRAF = null; }
  if (resampleTimer) { clearInterval(resampleTimer); resampleTimer = null; }
  if (visibilityHandler) {
    document.removeEventListener('visibilitychange', visibilityHandler);
    visibilityHandler = null;
  }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  if (canvasStream) { canvasStream.getTracks().forEach(t => t.stop()); canvasStream = null; }

  const mainServer = ownedMainServer;
  const clientId = ownedClientId;
  let unregisterError = null;
  if (shouldUnregister) {
    try {
      const result = await fetchJson(`${mainServer}/unregister/`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({client_id: clientId})
      }, 30000);
      shouldUnregister = false;
      log(`Unregister: ${result.status}`);
    } catch(e) {
      unregisterError = e;
      log(`Unregister failed: ${e.message}`);
    }
  }

  if (!unregisterError) {
    ownedClientId = null;
    ownedMainServer = null;
  }
  dc = null;
  setStatus(unregisterError ? 'disconnected (unregister failed)' : 'disconnected', false);
  document.getElementById('connectBtn').disabled = Boolean(unregisterError);
  document.getElementById('disconnectBtn').disabled = !unregisterError;
  document.getElementById('talkBtn').disabled = true;
  document.getElementById('cancelBtn').disabled = true;
  log(unregisterError ? 'Disconnected locally; server cleanup failed' : 'Disconnected');
  disconnecting = false;
}

function sendSignal(signal) {
  if (dc && dc.readyState === 'open') {
    dc.send(JSON.stringify({direct: true, signal}));
    log(`Sent: ${signal}`);
  }
}

function sendCancel() { sendSignal('cancel'); }

// Talk button: press=recording_start, release=recording_end
const talkBtn = document.getElementById('talkBtn');
function talkStart(e) {
  e.preventDefault();
  if (talkBtn.disabled) return;
  talkBtn.classList.add('active');
  talkBtn.textContent = 'Speaking...';
  sendSignal('recording_start');
}
function talkEnd(e) {
  e.preventDefault();
  if (talkBtn.disabled) return;
  talkBtn.classList.remove('active');
  talkBtn.textContent = 'Hold to Talk';
  sendSignal('recording_end');
}
talkBtn.addEventListener('mousedown', talkStart);
talkBtn.addEventListener('mouseup', talkEnd);
talkBtn.addEventListener('mouseleave', (e) => {
  if (talkBtn.classList.contains('active')) talkEnd(e);
});
talkBtn.addEventListener('touchstart', talkStart);
talkBtn.addEventListener('touchend', talkEnd);
</script>

</body>
</html>
